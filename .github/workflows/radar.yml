# Forward Radar pipeline: scan -> radar -> dashboard -> Telegram -> email -> Vercel.
#
# Triggered via workflow_dispatch only: an external scheduler fires it at
# 20:30 SGT on weekdays because GitHub's own cron queue ran this repo's
# schedule ~2 hours late every day. Repository secrets
# (Settings > Secrets and variables > Actions):
#   TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID  for the Telegram push
#   RESEND_API_KEY / EMAIL_TO              for the email copy
#   VERCEL_TOKEN                           for the site deploy
# Steps that are missing their secret skip cleanly instead of failing.

name: Forward Radar

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: [".radar-trigger"]

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan (packet.json feeds the earnings section)
        continue-on-error: true
        timeout-minutes: 12
        run: python scan.py

      - name: Build radar and dashboard
        run: |
          python radar.py
          python render_radar.py

      - name: Commit generated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/radar*.html
          if git diff --cached --quiet; then
            echo "no dashboard changes to commit"
          else
            git commit -m "Radar $(date -u +%F)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi

      - name: Telegram push
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "telegram secrets not set, skipping push"
          else
            python notify_radar.py
          fi

      - name: Email dashboard
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$EMAIL_TO" ]; then
            echo "email secrets not set, skipping email"
          else
            python deliver.py reports/radar.html
          fi

      - name: Deploy site to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_zQec9Vu48HfwjPhRAA094452
          VERCEL_PROJECT_ID: prj_zV4sU73RAl9SzwahRce9B28Rvojp
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set, skipping deploy"
          else
            npx vercel@latest deploy reports --prod --yes --token "$VERCEL_TOKEN"
          fi
